# Frontend — Next.js Node server (standalone) บน dormi_network
# edge จะ proxy dormi-linkandrent.com → dormi-web:3000
#
# รัน:
#   docker compose up -d --build
# scale (edge กระจาย load ให้เอง):
#   docker compose up -d --scale dormi-web=2
services:
  dormi-web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3000
      # commit ที่ deploy — deploy.sh ส่งเข้ามา (โผล่ที่ GET /version, runtime env)
      - APP_VERSION=${APP_VERSION:-unknown}
      # prod อ่าน release จาก mount ด้านล่าง (local default ./.dev-release)
      - RELEASE_DIR=/dormi-releases
    volumes:
      # release info (VERSION + RELEASES.log ที่ version manager เขียนบน host) — อ่านตอน runtime
      # :ro = อ่านอย่างเดียว · local: path ไม่มี → Docker สร้างโฟลเดอร์ว่าง (โค้ดต้อง fail-safe)
      - /root/dormi-releases:/dormi-releases:ro
    expose:
      - "3000"          # ไม่ publish ออก host — เข้าผ่าน edge เท่านั้น
    networks:
      - dormi_network
    # ไม่ตั้ง container_name → scale ได้

networks:
  dormi_network:
    external: true
