# เสิร์ฟ Next.js static export (out/) แบบ SPA
# หมายเหตุ: dynamic route ถูก build เป็น placeholder "_" (เช่น /apartments/_/meters)
# → rewrite path ที่มี id จริงให้ชี้ shell "_" แล้ว client อ่าน id จริงจาก URL (useParams)
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # asset ของ Next (hash ในชื่อไฟล์ → cache ยาวได้)
    location /_next/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── dynamic apartment routes → placeholder shell ──
    # nested (2 dynamic segment) ต้องมาก่อน single
    rewrite ^/apartments/[^/]+/invoices/[^/]+/?$        /apartments/_/invoices/_/index.html last;
    rewrite ^/apartments/[^/]+/billing-periods/[^/]+/?$ /apartments/_/billing-periods/_/index.html last;
    # single dynamic subpage: /apartments/<id>/<page>
    rewrite ^/apartments/[^/]+/([^/]+)/?$               /apartments/_/$1/index.html last;
    # apartment root: /apartments/<id>
    rewrite ^/apartments/[^/]+/?$                        /apartments/_/index.html last;

    # static routes (trailingSlash → <route>/index.html) + fallback 404
    location / {
        try_files $uri $uri/ $uri/index.html /404.html;
    }

    error_page 404 /404.html;
}
