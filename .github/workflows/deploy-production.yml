# Deploy frontend แบบ "มือ" (per-service) — ไม่ auto ตอน push แล้ว
# ─────────────────────────────────────────────────────────────────
# ★ push → main = แค่เก็บโค้ดขึ้น GitHub (ไม่ deploy)
#   deploy ทำผ่าน:
#     - ปกติ/coordinated → edge full-update (มี snapshot + version + rollback)
#       แก้ FE ฝั่งเดียว → full-update เลือก scope=frontend (เบา ไม่ rebuild BE)
#     - hotfix FE เร็วสุด → กดปุ่มนี้ (Actions → Run workflow) หรือ:
#         gh workflow run deploy-production.yml --repo <owner>/dormi-fe-2
#   เหตุผลที่ตัด auto: กัน deploy ซ้ำซ้อน/ชนกับ full-update (ต้อง push main ก่อน trigger edge)
#
# GitHub Secrets ที่ต้องตั้ง (Settings → Secrets and variables → Actions):
#   SERVER_USER  — user SSH บน server (เช่น root)
#   PROD_SERVER  — IP หรือ hostname ของ server
#   SSH_KEY      — private key สำหรับ SSH (เนื้อหาไฟล์ .pem / id_ed25519)
#
# บน server ต้องมี:
#   /root/dormi-edge     (clone repo dormi-edge — เก็บ deploy scripts)
#   /root/dormi-fe-2     (clone repo นี้ + .env.production)

name: Deploy to Production

on:
  workflow_dispatch:

concurrency:
  group: deploy-production-frontend
  cancel-in-progress: false

jobs:
  # ── ด่านตรวจ lock ── ลอง `npm ci` บน Linux (แบบเดียวกับ Docker build บน server)
  #   ถ้า package-lock.json เพี้ยน (เช่น @emnapi หายเพราะ gen จาก Windows) จะแดงตรงนี้
  #   → job deploy ถูกข้าม → รู้ก่อนขึ้น server (แก้ด้วย `npm run lockfile` แล้ว push ใหม่)
  check-lockfile:
    name: Verify lockfile (npm ci)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci

  deploy:
    name: Deploy dormi-fe-2
    needs: check-lockfile          # deploy ต่อเมื่อด่านตรวจ lock ผ่านเท่านั้น
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_SERVER }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          script_stop: true
          script: |
            set -e
            cd /root/dormi-edge/deploy/dormi-frontend && bash deploy.sh
